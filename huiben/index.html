<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大健康绘本作品展</title>
<style>
  :root {
    --bg: #fef9ef;
    --card-bg: #ffffff;
    --primary: #ff6b6b;
    --secondary: #ffd93d;
    --accent1: #6bcb77;
    --accent2: #4d96ff;
    --accent3: #ff922b;
    --accent4: #be4bdb;
    --text: #2d3436;
    --text-light: #636e72;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
    --radius: 20px;
    --radius-sm: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ========== 装饰背景 ========== */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,107,107,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 30%, rgba(77,150,255,0.06) 0%, transparent 50%),
      radial-gradient(circle at 50% 80%, rgba(107,203,119,0.06) 0%, transparent 50%),
      radial-gradient(circle at 10% 70%, rgba(255,217,61,0.06) 0%, transparent 50%),
      radial-gradient(circle at 90% 60%, rgba(190,75,219,0.05) 0%, transparent 50%);
    z-index: -1;
    pointer-events: none;
  }

  /* 旧 header 样式已由 hero-section 替代 */

  /* ========== 网格容器 ========== */
  .gallery-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
  }

  /* ========== 学生卡片 ========== */
  .student-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 28px 20px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    border: 2px solid transparent;
  }

  .student-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    transition: height 0.3s ease;
  }

  .student-card:nth-child(5n+1)::before { background: var(--primary); }
  .student-card:nth-child(5n+2)::before { background: var(--accent2); }
  .student-card:nth-child(5n+3)::before { background: var(--accent1); }
  .student-card:nth-child(5n+4)::before { background: var(--accent3); }
  .student-card:nth-child(5n+5)::before { background: var(--accent4); }

  .student-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow-lg);
    border-color: rgba(0,0,0,0.06);
  }

  .student-card:hover::before {
    height: 8px;
  }

  .student-card .avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    transition: transform 0.3s ease;
  }

  .student-card:hover .avatar {
    transform: scale(1.1) rotate(-5deg);
  }

  .card-0 .avatar { background: linear-gradient(135deg, #ff6b6b, #ff8787); }
  .card-1 .avatar { background: linear-gradient(135deg, #4d96ff, #74b9ff); }
  .card-2 .avatar { background: linear-gradient(135deg, #6bcb77, #8ce99a); }
  .card-3 .avatar { background: linear-gradient(135deg, #ff922b, #ffa94d); }
  .card-4 .avatar { background: linear-gradient(135deg, #be4bdb, #da77f2); }
  .card-5 .avatar { background: linear-gradient(135deg, #20c997, #63e6be); }
  .card-6 .avatar { background: linear-gradient(135deg, #f06595, #f783ac); }
  .card-7 .avatar { background: linear-gradient(135deg, #339af0, #5c7cfa); }
  .card-8 .avatar { background: linear-gradient(135deg, #fcc419, #ffd43b); }
  .card-9 .avatar { background: linear-gradient(135deg, #845ef7, #b197fc); }
  .card-10 .avatar { background: linear-gradient(135deg, #ff8787, #ffc9c9); }

  .student-card .name {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--text);
  }

  .student-card .page-count {
    font-size: 13px;
    color: var(--text-light);
  }

  .student-card .page-count span {
    font-weight: 600;
    color: var(--primary);
  }

  /* ========== 绘本阅读器 ========== */
  .reader-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  .reader-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .reader-topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: #fff;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
  }

  .reader-topbar .student-name {
    font-size: 20px;
    font-weight: 700;
  }

  .reader-topbar .page-indicator {
    font-size: 14px;
    opacity: 0.8;
    background: rgba(255,255,255,0.15);
    padding: 6px 14px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
  }

  .btn-close {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.15);
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
  }

  .btn-close:hover {
    background: rgba(255,255,255,0.3);
    transform: scale(1.1);
  }

  .reader-main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 80px 20px 20px;
    position: relative;
  }

  .reader-page {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    transition: opacity 0.3s ease, transform 0.3s ease;
    user-select: none;
    -webkit-user-drag: none;
  }

  .reader-page.swiping-left {
    transform: translateX(-80px);
    opacity: 0;
  }

  .reader-page.swiping-right {
    transform: translateX(80px);
    opacity: 0;
  }

  .nav-btn {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 50px; height: 50px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.12);
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    z-index: 5;
    backdrop-filter: blur(10px);
  }

  .nav-btn:hover {
    background: rgba(255,255,255,0.25);
    transform: translateY(-50%) scale(1.1);
  }

  .nav-btn:active {
    transform: translateY(-50%) scale(0.95);
  }

  .nav-btn.prev { left: 16px; }
  .nav-btn.next { right: 16px; }

  .nav-btn svg {
    width: 24px; height: 24px;
    fill: none; stroke: currentColor; stroke-width: 2.5;
    stroke-linecap: round; stroke-linejoin: round;
  }

  /* ========== 底部缩略图条 ========== */
  .thumbnails-bar {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    padding: 8px 16px;
    background: rgba(0,0,0,0.4);
    border-radius: 24px;
    backdrop-filter: blur(10px);
    overflow-x: auto;
    max-width: 90vw;
    z-index: 10;
  }

  .thumb-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .thumb-dot.active {
    background: #fff;
    transform: scale(1.3);
    box-shadow: 0 0 8px rgba(255,255,255,0.5);
  }

  .thumb-dot:hover {
    background: rgba(255,255,255,0.6);
  }

  /* ========== 页脚 ========== */
  .footer {
    text-align: center;
    padding: 8px 20px 32px;
    color: var(--text-light);
    font-size: 13px;
  }

  .student-card .keyword {
    display: inline-block;
    font-size: 12px;
    color: #fff;
    padding: 3px 12px;
    border-radius: 12px;
    margin-top: 4px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .card-0 .keyword { background: var(--primary); }
  .card-1 .keyword { background: var(--accent2); }
  .card-2 .keyword { background: var(--accent1); }
  .card-3 .keyword { background: var(--accent3); }
  .card-4 .keyword { background: var(--accent4); }
  .card-5 .keyword { background: #20c997; }
  .card-6 .keyword { background: #f06595; }
  .card-7 .keyword { background: #339af0; }
  .card-8 .keyword { background: #fcc419; }
  .card-9 .keyword { background: #845ef7; }
  .card-10 .keyword { background: #ff8787; }

  /* ========== 头图区域 ========== */
  .hero-section {
    position: relative;
    width: 100%;
    height: 360px;
    overflow: hidden;
    margin-bottom: 20px;
    border-radius: 0 0 30px 30px;
  }

  .hero-slider {
    position: absolute;
    inset: 0;
  }

  .hero-slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1.2s ease-in-out;
  }

  .hero-slide.active {
    opacity: 1;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(to bottom, rgba(0,0,0,0.35), rgba(0,0,0,0.55));
    color: #fff;
    text-align: center;
    z-index: 2;
  }

  .hero-icon {
    font-size: 52px;
    margin-bottom: 8px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    animation: float 3s ease-in-out infinite;
  }

  .hero-overlay h1 {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: 3px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.4);
    margin-bottom: 6px;
  }

  .hero-subtitle {
    font-size: 16px;
    opacity: 0.9;
    letter-spacing: 2px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .hero-decoration {
    margin-top: 14px;
    display: flex;
    gap: 12px;
    font-size: 24px;
    opacity: 0.85;
  }

  .hero-decoration .deco-emoji {
    animation: floatDeco 2.5s ease-in-out infinite;
  }

  .hero-decoration .deco-emoji:nth-child(1) { animation-delay: 0s; }
  .hero-decoration .deco-emoji:nth-child(2) { animation-delay: 0.3s; }
  .hero-decoration .deco-emoji:nth-child(3) { animation-delay: 0.6s; }
  .hero-decoration .deco-emoji:nth-child(4) { animation-delay: 0.9s; }
  .hero-decoration .deco-emoji:nth-child(5) { animation-delay: 1.2s; }

  @keyframes floatDeco {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-6px) scale(1.1); }
  }

  .hero-dots {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 3;
  }

  .hero-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.6);
    background: transparent;
    cursor: pointer;
    transition: all 0.3s;
  }

  .hero-dot.active {
    background: #fff;
    border-color: #fff;
    transform: scale(1.3);
  }

  .hero-dot:hover {
    border-color: #fff;
  }

  /* ========== 阅读器关键词 ========== */
  .reader-keyword {
    font-size: 13px;
    opacity: 0.7;
    margin-left: 10px;
    background: rgba(255,255,255,0.15);
    padding: 4px 12px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
  }

  /* ========== 响应式 - 头图 ========== */
  @media (max-width: 768px) {
    .hero-section { height: 260px; border-radius: 0 0 20px 20px; }
    .hero-overlay h1 { font-size: 28px; }
    .hero-icon { font-size: 38px; }
    .hero-subtitle { font-size: 13px; }
    .hero-decoration { font-size: 18px; gap: 8px; }
  }
    .header { padding: 36px 16px 20px; }
    .header h1 { font-size: 28px; }
    .header .icon-row { font-size: 36px; }
    .gallery-grid {
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
    }
    .student-card { padding: 22px 14px 18px; }
    .student-card .name { font-size: 17px; }
    .student-card .avatar { width: 56px; height: 56px; font-size: 24px; }
    .reader-page { max-width: 95vw; max-height: 75vh; }
    .nav-btn { width: 40px; height: 40px; }
    .thumbnails-bar { gap: 5px; padding: 6px 12px; }
    .thumb-dot { width: 8px; height: 8px; }
  }

  @media (max-width: 480px) {
    .gallery-grid {
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
    }
    .student-card { padding: 18px 10px 14px; }
    .student-card .name { font-size: 15px; }
    .header h1 { font-size: 24px; }
  }
</style>
</head>
<body>

<!-- 页头 -->
<!-- 头图区域 -->
<div class="hero-section">
  <div class="hero-slider">
    <div class="hero-slide active" style="background-image: url('./hero/hero2.jpg')"></div>
    <div class="hero-slide" style="background-image: url('./hero/hero3.jpg')"></div>
  </div>
  <div class="hero-overlay">
    <div class="hero-icon">📚</div>
    <h1>大健康绘本作品展</h1>
    <p class="hero-subtitle">AI社团 · 小小绘本家们的精彩创作</p>
    <div class="hero-decoration">
      <span class="deco-emoji">🌱</span>
      <span class="deco-emoji">🏃</span>
      <span class="deco-emoji">🥗</span>
      <span class="deco-emoji">😊</span>
      <span class="deco-emoji">💪</span>
    </div>
  </div>
  <div class="hero-dots">
    <button class="hero-dot active" data-slide="0"></button>
    <button class="hero-dot" data-slide="1"></button>
  </div>
</div>

<!-- 画廊网格 -->
<div class="gallery-container">
  <div class="gallery-grid" id="galleryGrid"></div>
</div>

<div class="footer">❤ 每一页都是孩子们的奇思妙想</div>

<!-- 绘本阅读器浮层 -->
<div class="reader-overlay" id="readerOverlay">
  <div class="reader-topbar">
    <button class="btn-close" id="btnClose" title="返回画廊">✕</button>
    <span class="student-name" id="readerStudentName"></span>
    <span class="page-indicator" id="readerPageIndicator"></span>
  </div>
  <div class="reader-main">
    <button class="nav-btn prev" id="btnPrev" title="上一页">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <img class="reader-page" id="readerPage" src="" alt="绘本页面" />
    <button class="nav-btn next" id="btnNext" title="下一页">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
  <div class="thumbnails-bar" id="thumbnailsBar"></div>
</div>

<script>
// ===== 绘本数据 =====
const students = [
  { name: "付佳萱", keyword: "不沉迷游戏", icon: "🎮", pages: ["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg"] },
  { name: "吉悠然", keyword: "勤劳", icon: "🧹", pages: ["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg","7.jpg","8.jpg","9.jpg"] },
  { name: "张巍龄", keyword: "爱护口腔", icon: "🦷", pages: ["1.png","2.png","3.png","4.png","5.png","6.png","7.png","8.png","9.png","10.png"] },
  { name: "张琬宁", keyword: "多吃蔬菜", icon: "🥬", pages: ["1.png","2.png","3.jpg","4.jpg","5.png","6.jpg","7.png"] },
  { name: "杨奕歆", keyword: "不挑食", icon: "🍽️", pages: ["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg","7.jpg","8.jpg","9.jpg","10.jpg"] },
  { name: "沈安晴", keyword: "多运动", icon: "⚽", pages: ["1.png","2.png","3.png","4.png","5.png","6.png","7.png"] },
  { name: "王丞烨", keyword: "多运动", icon: "🏀", pages: ["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg"] },
  { name: "王珺楷", keyword: "早睡不熬夜", icon: "😴", pages: ["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg","7.jpg"] },
  { name: "钱祁琳", keyword: "爱护眼睛", icon: "👀", pages: ["ScreenShot_2026-06-17_152115_534.png","2.png","3.png","4.png","5.png","6.png","7.png"] },
  { name: "陶乐天", keyword: "控制情绪", icon: "😊", pages: ["1.jpg","2.jpg","3.jpg","4.jpg"] },
  { name: "马珺申", keyword: "缓解考试紧张", icon: "📝", pages: ["1.png","2.png","3.png","4.png","5.png","6.png"] }
];

// ===== 构建画廊 =====
const galleryGrid = document.getElementById('galleryGrid');
students.forEach((student, index) => {
  const card = document.createElement('div');
  card.className = `student-card card-${index}`;
  card.innerHTML = `
    <div class="avatar">${student.icon || student.name.charAt(0)}</div>
    <div class="name">${student.name}</div>
    <div class="keyword">${student.keyword}</div>
    <div class="page-count"><span>${student.pages.length}</span> 页绘本</div>
  `;
  card.addEventListener('click', () => openReader(index));
  galleryGrid.appendChild(card);
});

// ===== 阅读器逻辑 =====
const overlay = document.getElementById('readerOverlay');
const readerPage = document.getElementById('readerPage');
const readerStudentName = document.getElementById('readerStudentName');
const readerPageIndicator = document.getElementById('readerPageIndicator');
const thumbnailsBar = document.getElementById('thumbnailsBar');
const btnClose = document.getElementById('btnClose');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');

let currentStudentIdx = -1;
let currentPageIdx = 0;
let isAnimating = false;

function getImageUrl(studentName, filename) {
  return './images/' + encodeURIComponent(studentName) + '/' + encodeURIComponent(filename);
}

function updateReader() {
  const student = students[currentStudentIdx];
  const url = getImageUrl(student.name, student.pages[currentPageIdx]);
  readerPage.src = url;
  readerStudentName.innerHTML = student.name + ' <span class="reader-keyword">' + student.icon + ' ' + student.keyword + '</span>';
  readerPageIndicator.textContent = `${currentPageIdx + 1} / ${student.pages.length}`;

  // 更新缩略图点
  let dotsHtml = '';
  for (let i = 0; i < student.pages.length; i++) {
    dotsHtml += `<button class="thumb-dot${i === currentPageIdx ? ' active' : ''}" data-idx="${i}" title="第${i+1}页"></button>`;
  }
  thumbnailsBar.innerHTML = dotsHtml;

  // 缩略图点击事件
  thumbnailsBar.querySelectorAll('.thumb-dot').forEach(dot => {
    dot.addEventListener('click', (e) => {
      const idx = parseInt(e.target.dataset.idx);
      navigateTo(idx);
    });
  });

  // 按钮状态
  btnPrev.style.visibility = currentPageIdx === 0 ? 'hidden' : 'visible';
  btnNext.style.visibility = currentPageIdx === student.pages.length - 1 ? 'hidden' : 'visible';
}

function navigateTo(idx) {
  if (isAnimating || idx === currentPageIdx) return;
  const student = students[currentStudentIdx];
  if (idx < 0 || idx >= student.pages.length) return;

  isAnimating = true;
  const direction = idx > currentPageIdx ? 'left' : 'right';
  readerPage.classList.add(`swiping-${direction}`);

  setTimeout(() => {
    currentPageIdx = idx;
    updateReader();
    readerPage.classList.remove('swiping-left', 'swiping-right');
    setTimeout(() => { isAnimating = false; }, 300);
  }, 150);
}

function openReader(studentIdx) {
  currentStudentIdx = studentIdx;
  currentPageIdx = 0;
  updateReader();
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeReader() {
  overlay.classList.remove('active');
  document.body.style.overflow = '';
  currentStudentIdx = -1;
  currentPageIdx = 0;
}

// 导航
btnPrev.addEventListener('click', () => navigateTo(currentPageIdx - 1));
btnNext.addEventListener('click', () => navigateTo(currentPageIdx + 1));
btnClose.addEventListener('click', closeReader);

// 键盘导航
document.addEventListener('keydown', (e) => {
  if (!overlay.classList.contains('active')) return;
  if (e.key === 'Escape') closeReader();
  if (e.key === 'ArrowLeft') navigateTo(currentPageIdx - 1);
  if (e.key === 'ArrowRight') navigateTo(currentPageIdx + 1);
});

// 触摸滑动
let touchStartX = 0;
let touchStartY = 0;
readerPage.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

readerPage.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
    if (dx < 0) navigateTo(currentPageIdx + 1);
    else navigateTo(currentPageIdx - 1);
  }
});

// 点击 overlay 空白处关闭（但不影响图片区域）
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closeReader();
});

// 图片加载错误处理
readerPage.addEventListener('error', () => {
  readerPage.src = 'data:image/svg+xml,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">' +
    '<rect fill="#f1f3f5" width="400" height="300" rx="12"/>' +
    '<text fill="#adb5bd" font-family="sans-serif" font-size="16" text-anchor="middle" x="200" y="145">图片加载中...</text>' +
    '<text fill="#adb5bd" font-family="sans-serif" font-size="12" text-anchor="middle" x="200" y="170">Loading...</text>' +
    '</svg>'
  );
});

// ===== 头图轮播 =====
const heroSlides = document.querySelectorAll('.hero-slide');
const heroDots = document.querySelectorAll('.hero-dot');
let currentSlide = 0;
const totalSlides = heroSlides.length;

function goToSlide(idx) {
  heroSlides[currentSlide].classList.remove('active');
  heroDots[currentSlide].classList.remove('active');
  currentSlide = idx;
  heroSlides[currentSlide].classList.add('active');
  heroDots[currentSlide].classList.add('active');
}

heroDots.forEach(dot => {
  dot.addEventListener('click', () => {
    goToSlide(parseInt(dot.dataset.slide));
    resetAutoPlay();
  });
});

let autoPlayTimer;
function startAutoPlay() {
  autoPlayTimer = setInterval(() => {
    goToSlide((currentSlide + 1) % totalSlides);
  }, 5000);
}

function resetAutoPlay() {
  clearInterval(autoPlayTimer);
  startAutoPlay();
}

startAutoPlay();
</script>

</body>
</html>
